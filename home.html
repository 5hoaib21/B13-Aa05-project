<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issue Tracker | Home</title>
    <link rel="stylesheet" href="style.css" />
    

    <!-- Google Font & FontAwesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind & Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-base-300">
    <header>
      <nav class="bg-base-200 shadow-sm">
        <div class="navbar w-11/12 mx-auto">
          <div class="flex-1">
            <a href="./home.html" class="btn btn-ghost text-xl"
              ><img
                class="max-w-10"
                src="./assets/github-logo.png"
                alt=""
              />GitHub Issues Tracker</a
            >
          </div>
          <div class="flex gap-2">
            <input
              id="searchIssue"
              type="text"
              placeholder="🔍 Search Issues..."
              class="input input-bordered w-24 md:w-auto"
            />
            <div>
              <button id="searchBtn" class="btn btn-primary text-white">Search</button>
              <button id="logoutBtn" class="btn btn-primary">
                <i
                  class="fa-solid fa-arrow-right-from-bracket 
                  style="color: rgb(255, 255, 255)"
                ></i>
                LogOut
              </button>
            </div>
          </div>
        </div>
      </nav>
    </header>

    

    <script src="./script.js"></script>
  </body>
</html>
